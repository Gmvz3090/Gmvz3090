<svg xmlns="http://www.w3.org/2000/svg" width="488" height="438" viewBox="0 0 488 438" role="img" aria-label="ASCII portrait">
<style>
    text {
      font: 10px "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      fill: #24292f;
      white-space: pre;
    }
    @media (prefers-color-scheme: dark) { text { fill: #c9d1d9; } }
    
    .row {
      clip-path: inset(0 100% 0 0);
      animation: type 0.05s steps(78) forwards;
    }
    @keyframes type { to { clip-path: inset(0 -2% 0 0); } }
    .cursor { animation: blink 1s steps(1) infinite; animation-delay: 1.90s; opacity: 0; }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
    .row:nth-of-type(1) { animation-delay: 0.00s; }
.row:nth-of-type(2) { animation-delay: 0.05s; }
